name: tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core deps (no heavy ML stack)
        run: |
          python -m pip install --upgrade pip
          pip install pytest python-dotenv tiktoken
      - name: Run V2 test suite
        run: pytest tests/ -v --no-header
